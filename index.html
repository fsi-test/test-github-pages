<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>検証用ページ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>検証用ページ</h1>
            <p class="subtitle">テスト</p>
        </header>

        <main>
            <!-- ナビゲーションセクション -->
            <section>
                <h2>ページ遷移テスト</h2>
                <p><a href="page2.html">ページ2へ</a></p>
                <p><a href="page3.html">ページ3へ</a></p>
            </section>

            <!-- タスク追加フォーム -->
            <section class="task-form-section">
                <h2>タスク追加テスト</h2>
                <form id="taskForm" class="task-form">
                    <div class="form-group">
                        <label for="taskInput">タスク名:</label>
                        <input 
                            type="text" 
                            id="taskInput" 
                            name="taskInput"
                            placeholder="タスクを入力してください"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="prioritySelect">優先度:</label>
                        <select id="prioritySelect" name="priority">
                            <option value="low">低</option>
                            <option value="medium" selected>中</option>
                            <option value="high">高</option>
                        </select>
                    </div>
                    <button type="submit" id="addTaskBtn" class="btn btn-primary">
                        タスクを追加
                    </button>
                </form>
            </section>

            <!-- フィルターとカウンター -->
            <section class="controls-section">
                <div class="filter-buttons">
                    <button class="btn btn-filter active" data-filter="all">
                        全て (<span id="countAll">0</span>)
                    </button>
                    <button class="btn btn-filter" data-filter="active">
                        未完了 (<span id="countActive">0</span>)
                    </button>
                    <button class="btn btn-filter" data-filter="completed">
                        完了 (<span id="countCompleted">0</span>)
                    </button>
                </div>
                <button id="clearCompletedBtn" class="btn btn-danger">
                    完了済みを削除する
                </button>
            </section>

            <!-- タスクリスト -->
            <section class="task-list-section">
                <h2>タスク一覧</h2>
                <div id="loadingIndicator" class="loading" style="display: none;">
                    読み込み中...
                </div>
                <ul id="taskList" class="task-list">
                    <!-- タスクが動的に追加されます -->
                </ul>
                <div id="emptyMessage" class="empty-message">
                    タスクがありません。新しいタスクを追加してください。
                </div>
            </section>

            <!-- アクションボタン -->
            <section class="actions-section">
                <button id="showModalBtn" class="btn btn-secondary">
                    ヘルプを表示
                </button>
                <button id="resetBtn" class="btn btn-warning">
                    全てリセット
                </button>
            </section>
        </main>
    </div>

    <!-- モーダル -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>使い方</h2>
            <div class="modal-body">
                <p>このアプリケーションは、テストを検証するためのサンプルシステムです。</p>
                <ul>
                    <li>タスク名と優先度を入力してタスクを追加できます</li>
                    <li>チェックボックスでタスクを完了としてマークできます</li>
                    <li>✏️ 編集ボタンでタスク名を編集できます</li>
                    <li>ゴミ箱アイコンでタスクを削除できます</li>
                    <li>フィルターボタンでタスクを絞り込めます</li>
                </ul>
                <button id="modalCloseBtn" class="btn btn-primary">閉じる</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
